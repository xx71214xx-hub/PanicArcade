<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة ألعاب Panic Arcade</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="hub-container">
        <button id="launchGameBtn" class="play-btn-3d" style="width:100%; border:none; font-family:inherit; cursor:pointer;">▶️ اِلعب الآن</button>
    </div>

<script type="module">
    import { authenticateTelegramUser } from './src/api/auth.js';

    document.addEventListener("DOMContentLoaded", async () => {
        // تشغيل المصادقة في الـ Hub الرئيسي لإنشاء الحساب أولاً
        await authenticateTelegramUser();
    });

    // كود نقل البيانات السلس إلى مجلد اللعبة عند الضغط
    document.getElementById("launchGameBtn").addEventListener("click", function() {
        if (window.Telegram && window.Telegram.WebApp) {
            const initData = window.Telegram.WebApp.initData;
            window.location.href = `game_2048/index.html?tgWebAppStartParam=${encodeURIComponent(initData)}`;
        } else {
            window.location.href = "game_2048/index.html";
        }
    });
</script>
</body>
</html>
